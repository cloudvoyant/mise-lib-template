# =============================================================================
# mise.toml - rust template
# Overlays the base mise.toml during scaffold. Tasks are file tasks under
# mise-tasks/ (this template overrides only the tasks that differ from base).
# =============================================================================

[env]
_.path   = ['{{config_root}}/node_modules/.bin']
PROJECT  = "mise-lib-template"
VERSION  = "{{exec(command='cat version.txt 2>/dev/null || echo 0.1.0')}}"

[tools]
# rustfmt+clippy declared here (comma-string form — mise rejects the array form) so
# mise auto-installs them; `format:check`/`lint` then work without the install task,
# which the contract test runs tasks without.
rust       = { version = "1.88", components = "rustfmt,clippy" }
node       = "lts"
bats       = "latest"
shellcheck = "latest"
shfmt      = "latest"

[task_config]
includes = ["mise-tasks"]

[settings]
experimental = true
