# =============================================================================
# mise.toml - odin template
# Overlays the base mise.toml during scaffold. Tasks are file tasks under
# mise-tasks/ (this template overrides only the tasks that differ from base).
# =============================================================================

[env]
_.path  = ['{{config_root}}/node_modules/.bin']
PROJECT = "mise-lib-template"
VERSION = "{{exec(command='cat version.txt 2>/dev/null || echo 0.1.0')}}"

[tools]
# The mise registry short-name "odin" is broken (dead vfox/asdf plugin repos); use the
# github backend. Odin tags are calendar-based `dev-YYYY-MM`, NOT semver — pin an explicit
# dated release (bump this periodically; it won't look like semver to Renovate).
"github:odin-lang/Odin" = "dev-2026-07"
node       = "lts"
bats       = "latest"
shellcheck = "latest"
shfmt      = "latest"

[task_config]
includes = ["mise-tasks"]

[settings]
experimental = true
