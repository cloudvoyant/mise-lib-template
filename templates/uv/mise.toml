# =============================================================================
# mise.toml - uv (Python) template
# Overlays the base mise.toml during scaffold. Tasks are file tasks under
# mise-tasks/ (this template overrides only the tasks that differ from base).
# =============================================================================

[env]
PROJECT = "mise-lib-template"
# Read version from pyproject.toml [project].version
VERSION = "{{exec(command='python3 -c \"import tomllib,sys; f=open(\\\"pyproject.toml\\\",\\\"rb\\\"); d=tomllib.load(f); print(d[\\\"project\\\"][\\\"version\\\"])\" 2>/dev/null || echo 0.1.0')}}"
_.path  = ['{{config_root}}/node_modules/.bin']

[tools]
python     = "3.12"
uv         = "latest"
node       = "lts"
bats       = "latest"
shellcheck = "latest"
shfmt      = "latest"

[task_config]
includes = ["mise-tasks"]

[settings]
experimental = true
