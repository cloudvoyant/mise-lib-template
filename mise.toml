# =============================================================================
# mise.toml - Project configuration
# https://mise.jdx.dev/
#
# Tasks live as files under mise-tasks/ (auto-loaded). Nested directories become
# namespaced tasks: mise-tasks/build/prod -> `mise run build:prod`. A
# `_default` file makes the directory itself runnable (`mise run build`).
# =============================================================================

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
[env]
PROJECT                 = "mise-lib-template"
GCP_REGISTRY_PROJECT_ID = "devops-466002"
GCP_REGISTRY_REGION     = "us-east1"
GCP_REGISTRY_NAME       = "cloudvoyant-generic-registry"
VERSION                 = "{{exec(command='cat version.txt 2>/dev/null | tr -d [:space:] || echo 0.1.0')}}"
_.path                  = ['{{config_root}}/node_modules/.bin']
BIN_PATH                = "{{ config_root }}/node_modules/.bin"


# -----------------------------------------------------------------------------
# Tools
# -----------------------------------------------------------------------------
[tools]
node        = "lts"
shellcheck  = "latest"
shfmt       = "latest"
bats        = "latest"
python      = "latest"
gcloud      = "latest"
starship    = "latest"
claude      = "latest"


# -----------------------------------------------------------------------------
# Tasks (file tasks under mise-tasks/)
# -----------------------------------------------------------------------------
[task_config]
includes = ["mise-tasks"]

[settings]
experimental = true
